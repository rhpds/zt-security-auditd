# lab-metadata.yml
# Single Point of Truth for Lab Information

lab:
  name: "Enabling RHEL Security AuditD 101"
  shortname: "zt-security-auditd"
  maintainer: "Joshua Loscar (jloscar@redhat.com)" 
  
  description:
    summary: "This hands-on lab teaches you how to configure and use the Linux Audit framework (auditd) for security monitoring and compliance in Red Hat Enterprise Linux."
    goal: "You will be able to deploy and manage application control with FAPolicyd on Red Hat Enterprise Linux systems."
    concepts:
      - "Installing and configuring the AuditD daemon"
      - "Understanding audit log structure and record types"
      - "Writing custom audit rules for specific security requirements"
      - "Generating comprehensive security reports with aureport"  
    use_case: "Get familliar with Auditing on RHEL"
    time_to_complete: "30" # time in minutes
    
  # Git references for deployment
  git_ref:
    production: "v2.1"
    development: "main"

